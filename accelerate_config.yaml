# Full-training config — 8× H100 SXM
# `deepspeed_config_file` is RELATIVE to the cwd, so always launch with
# `cd <project_dir> && accelerate launch ...`.
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: DEEPSPEED
deepspeed_config:
  deepspeed_config_file: ds_config.json
  zero3_init_flag: false
machine_rank: 0
main_training_function: main
num_machines: 1
num_processes: 8
use_cpu: false
same_network: true
